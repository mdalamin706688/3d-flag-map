<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flag — Rotating Globe Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">

  <!-- amCharts 5 -->
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
</head>
<body>

  <!-- App -->
  <div id="app" class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🌍</span>
          <span class="logo-name">3D Flag Explorer</span>
        </div>
      </div>
      <div class="header-center">
        <div class="search-box" id="search-box">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search countries..." autocomplete="off" spellcheck="false">
          <div id="search-results" class="search-dropdown hidden"></div>
        </div>
      </div>
      <div class="header-right">
        <div class="stat-pill">
          <span class="stat-num" id="country-count-num">0</span>
          <span class="stat-label">Countries</span>
        </div>
      </div>
    </header>

    <!-- Main Layout -->
    <main class="main">

      <!-- Sidebar Country List -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <h3>Countries</h3>
          <span class="sidebar-count" id="sidebar-count">0</span>
        </div>
        <div class="continent-filter" id="continent-filter">
          <button class="filter-btn active" data-continent="all">All</button>
          <button class="filter-btn" data-continent="africa">Africa</button>
          <button class="filter-btn" data-continent="asia">Asia</button>
          <button class="filter-btn" data-continent="europe">Europe</button>
          <button class="filter-btn" data-continent="northamerica">Americas</button>
          <button class="filter-btn" data-continent="oceania">Oceania</button>
        </div>
        <div class="country-scroll" id="country-list"></div>
      </aside>

      <!-- Globe -->
      <div class="globe-area">
        <div id="chartdiv"></div>
      </div>

      <!-- Flag Detail Panel (right side) -->
      <aside id="flag-panel" class="flag-panel hidden">
        <button id="flag-panel-close" class="panel-close" title="Close">✕</button>
        <div class="panel-flag-frame">
          <img id="flag-image" class="panel-flag-img" src="" alt="">
        </div>
        <h2 id="flag-country-name" class="panel-title"></h2>
        <span class="panel-badge" id="flag-continent-badge"></span>
        <div class="panel-section" id="flag-neighbors">
          <h4 class="panel-section-title">More from this region</h4>
          <div class="panel-grid" id="neighbor-flags"></div>
        </div>
      </aside>

    </main>
  </div>

  <script src="js/countries-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
